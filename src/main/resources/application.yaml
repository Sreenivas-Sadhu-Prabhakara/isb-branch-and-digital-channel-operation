spring:
  application:
    name: isb-branch-and-digital-channel-operation

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  isb:
    serviceDomain: "Branch And Digital Channel Operation"
    businessArea: "Takaful and Shared Operations"
    businessDomain: "Shared Operations"
    functionalPattern: "Operate"
    assetType: "Channel Session"
    controlRecord: "Channel Session Operating Session"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
